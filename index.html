<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ResiaCraft | Mağaza</title>
    <style>
        body{margin:0;background:url('https://www.minecraft.net/content/dam/minecraft/home/Minecraft_Logo_2020.png') no-repeat center fixed;background-size:cover;color:#fff;font-family:sans-serif}
        .nav{background:rgba(0,0,0,.85);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #ffcc00}
        .sepet{color:red;font-weight:bold;animation:b 1s infinite;display:none;margin-left:15px}
        @keyframes b{50%{opacity:0}}
        #m{display:none;position:fixed;top:20%;left:30%;width:40%;background:#222;padding:20px;border:2px solid #fff;border-radius:10px;text-align:center}
        button{cursor:pointer;padding:12px 24px;background:#ffcc00;border:none;font-weight:bold;font-size:16px}
    </style>
</head>
<body>
    <div class="nav">
        <img src="aslan-logo.png" width="60" alt="Logo">
        <div>
            <span onclick="document.getElementById('m').style.display='block'" style="cursor:pointer">MAĞAZA</span>
            <span id="s" class="sepet">SEPET (1)</span>
            <span style="margin-left:20px">IP: play.resiacraft.com.tr</span>
        </div>
    </div>
    <div id="m">
        <h2>Boxmining Mağazası</h2>
        <button onclick="k()">VIP & Kasa Satın Al</button>
        <p>İşlem için üye olmalısın.</p>
        <button onclick="document.getElementById('m').style.display='none'" style="background:#555">Kapat</button>
    </div>
    <script>
        let L = false; 
        function k(){
            if(!L){alert("Üye Olmalısın!")}
            else{document.getElementById('s').style.display='inline';alert("Sepete Eklendi!")}
        }
    </script>
</body>
</html>
