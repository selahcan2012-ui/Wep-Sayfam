<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResiaCraft | Minecraft Sunucusu</title>
    <!-- Tailwind CSS (Tasarım için) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome (İkonlar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle, #1a1c23 0%, #0f1015 100%);
            color: #e2e8f0;
            font-family: sans-serif;
        }
        .minecraft-shadow {
            text-shadow: 3px 3px 0px #000;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- ÜST MENÜ -->
    <header class="p-6">
        <div class="container mx-auto flex justify-between items-center bg-[#16171d]/80 backdrop-blur-md px-6 py-4 rounded-2xl border border-gray-800 shadow-2xl">
            <div class="text-2xl font-black text-emerald-500 tracking-wider minecraft-shadow">RESIACRAFT</div>
            <nav class="flex space-x-6 items-center">
                <a href="#" class="text-emerald-400 font-bold"><i class="fa-solid fa-house mr-1"></i> Ana Sayfa</a>
                <!-- Mağaza Linkini Buraya Koyacaksın -->
                <a href="https://resiacraft.com.tr/magaza" target="_blank" class="bg-amber-500 hover:bg-amber-600 text-black font-extrabold px-4 py-2 rounded-xl transition shadow-lg flex items-center gap-2">
                    <i class="fa-solid fa-cart-shopping"></i> MAĞAZA
                </a>
            </nav>
        </div>
    </header>

    <!-- ANA GİRİŞ ALANI (HERO) -->
    <main class="container mx-auto px-6 text-center my-auto py-12">
        <div class="max-w-3xl mx-auto space-y-6">
            <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase">
                🚀 Macera Başlıyor!
            </span>
            
            <h1 class="text-5xl md:text-7xl font-extrabold text-white tracking-tight leading-none minecraft-shadow">
                Türkiye'nin En İyi <br><span class="text-emerald-500">Minecraft</span> Deneyimi
            </h1>
            
            <p class="text-gray-400 text-lg max-w-xl mx-auto">
                Gelişmiş sistemler, adil ekonomi ve kesintisiz eğlence. Sen yoksan bir kişi eksiğiz!
            </p>

            <!-- AKTİF OYUNCU VE IP ALANI -->
            <div class="bg-[#16171d] border border-gray-800 rounded-2xl p-6 max-w-md mx-auto shadow-2xl space-y-4">
                <!-- Canlı Oyuncu Sayısı -->
                <div class="flex items-center justify-center gap-3">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <p class="text-sm font-medium text-gray-300">
                        Şu an sunucuda <span id="player-count" class="text-green-400 font-bold">Yükleniyor...</span> kişi aktif!
                    </p>
                </div>

                <!-- IP Kopyalama Kutusu -->
                <div class="flex bg-black/40 rounded-xl p-2 border border-gray-700/50 justify-between items-center">
                    <code class="text-emerald-400 font-mono font-bold pl-3 text-sm md:text-base">play.resiacraft.com.tr</code>
                    <button onclick="copyIP()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg text-xs transition flex items-center gap-2">
                        <i class="fa-regular fa-copy"></i> <span id="btn-text">Kopyala</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="p-6 text-center text-xs text-gray-600 border-t border-gray-900 bg-[#0b0c10]">
        <p>&copy; 2026 ResiaCraft. Tüm Hakları Saklıdır.</p>
    </footer>

    <!-- CANLI OYUNCU ÇEKME VE KOPYALAMA SCRIPT'LERİ -->
    <script>
        // 1. Sunucudan Canlı Oyuncu Sayısını Çeken Kod (API)
        const serverIP = "play.resiacraft.com.tr";
        
        async function getOnlinePlayers() {
            try {
                const response = await fetch(`https://api.mcsrvstat.us/2/${serverIP}`);
                const data = await response.json();
                if(data.online) {
                    document.getElementById('player-count').innerText = data.players.online;
                } else {
                    document.getElementById('player-count').innerText = "0";
                }
            } catch (error) {
                document.getElementById('player-count').innerText = "?";
            }
        }
        // Sayfa açılınca ve her 30 saniyede bir oyuncu sayısını güncelle
        getOnlinePlayers();
        setInterval(getOnlinePlayers, 30000);

        // 2. IP Kopyalama Fonksiyonu
        function copyIP() {
            navigator.clipboard.writeText(serverIP);
            const btnText = document.getElementById('btn-text');
            btnText.innerText = "Kopyalandı!";
            setTimeout(() => { btnText.innerText = "Kopyala"; }, 2000);
        }
    </script>
</body>
</html>
